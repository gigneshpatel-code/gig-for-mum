<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#B85A38" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Gig for Parents" />
  <title>Gig for Parents</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF6F0; 
      --warm: #F2EAE1;  
      --terracotta: #B85A38; 
      --terra-dark: #914326; 
      --brown: #4A2E2B; 
      --text: #2B1B19; 
      --muted: #8A7370; 
      --border: #E6DCD3; 
      --shadow: rgba(74,46,43,0.06); 
      --radius: 16px;
    }
    html, body { height: 100%; height: 100dvh; background: var(--cream); font-family: 'Nunito', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; overflow: hidden; }

    /* INSTALL SCREEN */
    #install-screen {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      height: 100dvh; padding: 32px 24px;
      background: radial-gradient(circle at center, #FDFBFA 0%, #F2EAE1 100%); text-align: center;
    }
    .install-icon {
      width: 90px; height: 90px;
      background: linear-gradient(135deg, var(--terracotta), var(--terra-dark));
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 44px; margin-bottom: 24px; box-shadow: 0 10px 30px rgba(184,90,56,0.15);
    }
    #install-screen h1 { font-size: 24px; font-weight: 800; color: var(--brown); margin-bottom: 12px; letter-spacing: -0.3px; }
    #install-screen .subtitle { font-size: 15px; color: var(--muted); margin-bottom: 40px; line-height: 1.6; max-width: 320px; }
    .install-btn {
      width: 100%; max-width: 320px; padding: 16px;
      background: linear-gradient(135deg, var(--terracotta), var(--terra-dark));
      color: #fff; font-size: 16px; font-weight: 700; border: none; border-radius: 12px;
      cursor: pointer; margin-bottom: 14px; font-family: 'Nunito', sans-serif;
      box-shadow: 0 6px 20px rgba(184,90,56,0.25); transition: transform 0.1s, opacity 0.2s;
    }
    .install-btn:active { transform: scale(0.98); }
    .skip-btn {
      width: 100%; max-width: 320px; padding: 14px;
      background: transparent; color: var(--muted); font-size: 14px; font-weight: 700;
      border: 1.5px solid var(--border); border-radius: 12px; cursor: pointer;
      font-family: 'Nunito', sans-serif; transition: all 0.2s;
    }
    .skip-btn:active { background: var(--warm); }

    /* IOS GUIDE */
    #ios-guide {
      display: none; position: fixed; inset: 0;
      background: rgba(43,27,25,0.4); z-index: 300;
      align-items: flex-end; justify-content: center; padding: 20px;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .ios-card {
      background: #fff; border-radius: 24px; padding: 32px 24px 24px;
      max-width: 400px; width: 100%; box-shadow: 0 -10px 40px rgba(43,27,25,0.12); text-align: center;
    }
    .ios-card h3 { font-size: 20px; font-weight: 800; color: var(--brown); margin-bottom: 24px; }
    .ios-step { display: flex; align-items: flex-start; gap: 16px; text-align: left; margin-bottom: 20px; }
    .ios-num { width: 28px; height: 28px; flex-shrink: 0; background: var(--terracotta); color: #fff; border-radius: 50%; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .ios-step p { font-size: 14px; color: var(--text); line-height: 1.5; padding-top: 3px; }
    .ios-step p strong { color: var(--brown); font-weight: 700; }
    .ios-close { width: 100%; margin-top: 8px; padding: 14px; background: var(--warm); color: var(--brown); font-size: 15px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; font-family: 'Nunito', sans-serif; transition: background 0.2s; }
    .ios-close:active { background: var(--border); }

    /* APP SHELL */
    #app { display: none; flex-direction: column; height: 100dvh; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: #fff; border-bottom: 1px solid var(--border); box-shadow: 0 1px 10px var(--shadow); flex-shrink: 0; z-index: 10; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    
    .avatar { 
      width: 42px; height: 42px; 
      background: linear-gradient(135deg, var(--terracotta), var(--terra-dark)); 
      border-radius: 50%; display: flex; align-items: center; justify-content: center; 
      flex-shrink: 0; color: #fff; font-weight: 800; font-size: 17px; letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(184,90,56,0.15);
    }
    
    .header-info h2 { font-size: 16px; font-weight: 800; color: var(--brown); letter-spacing: -0.1px; }
    .status-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); font-weight: 600; }
    .status-dot::before { content: ''; width: 6px; height: 6px; background: #4BB543; border-radius: 50%; display: inline-block; }
    .lang-toggle { display: flex; align-items: center; background: var(--warm); border-radius: 20px; padding: 3px; gap: 1px; }
    .lang-btn { padding: 6px 14px; border-radius: 16px; border: none; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted); font-family: 'Nunito', sans-serif; }
    .lang-btn.active { background: #fff; color: var(--brown); box-shadow: 0 2px 6px rgba(4A,46,43,0.08); }
